# Local development infrastructure.
# Spins up SQL Server 2022 so the API has a database without a local install.
# Usage:  docker compose up -d
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: arla-connect-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123" # dev only - never use in prod
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - arla-connect-sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      retries: 10
      start_period: 30s

volumes:
  arla-connect-sqldata:
