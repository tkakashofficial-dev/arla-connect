# Local development database — PostgreSQL.
# Usage:  docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: arla-connect-db
    environment:
      POSTGRES_DB: arlaconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432" # host 15432 -> avoids clashing with any local Postgres on 5432
    volumes:
      - arla-connect-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arlaconnect"]
      interval: 5s
      retries: 10
      start_period: 10s

volumes:
  arla-connect-pgdata:
